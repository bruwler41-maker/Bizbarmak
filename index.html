<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bizbarmak | Welcome</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #0f0c29;
            background: linear-gradient(135deg, #24243e, #302b63, #0f0c29);
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
            color: white;
        }
        .auth-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            width: 100%; max-width: 380px; text-align: center;
            transition: transform 0.3s ease;
        }
        h2 { margin-bottom: 30px; font-size: 32px; font-weight: 600; letter-spacing: -1px; }
        input {
            width: 100%; padding: 14px; margin: 12px 0;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px; color: white; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #667eea; background: rgba(255, 255, 255, 0.15); }
        button {
            width: 100%; padding: 15px; margin-top: 20px;
            background: #667eea; border: none; border-radius: 12px;
            color: white; font-size: 16px; font-weight: bold; cursor: pointer;
            transition: 0.3s; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        button:hover { background: #764ba2; transform: translateY(-2px); }
        .hidden { display: none; }
        .switch-form { margin-top: 25px; font-size: 14px; opacity: 0.8; }
        .switch-form a { color: #667eea; text-decoration: none; font-weight: bold; cursor: pointer; }
        .switch-form a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="auth-container" id="box">
    <h2 id="formTitle">Войти</h2>
    
    <form action="/login" method="POST" id="loginForm">
        <input type="text" name="username" placeholder="Твой логин" required>
        <input type="password" name="password" placeholder="Пароль" required>
        <button type="submit">Полетели!</button>
    </form>

    <form action="/register" method="POST" id="registerForm" class="hidden">
        <input type="text" name="username" placeholder="Придумай крутой ник" required>
        <input type="password" name="password" placeholder="Надежный пароль" required>
        <button type="submit">Создать аккаунт</button>
    </form>

    <div class="switch-form" id="switchText">
        Впервые тут? <a onclick="toggleForm()">Зарегистрироваться</a>
    </div>
</div>

<script>
    function toggleForm() {
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const title = document.getElementById('formTitle');
        const switchText = document.getElementById('switchText');
        const box = document.getElementById('box');

        box.style.transform = "scale(0.95)";
        setTimeout(() => {
            if (loginForm.classList.contains('hidden')) {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                title.innerText = "Войти";
                switchText.innerHTML = 'Впервые тут? <a onclick="toggleForm()">Зарегистрироваться</a>';
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                title.innerText = "Регистрация";
                switchText.innerHTML = 'Уже с нами? <a onclick="toggleForm()">Войти</a>';
            }
            box.style.transform = "scale(1)";
        }, 200);
    }
</script>
</body>
</html>
