<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bizbarmak | Messanger</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #0f0c29; margin: 0; display: flex; height: 100vh; color: white; overflow: hidden; }
        
        /* Боковая панель */
        .sidebar { width: 280px; background: rgba(255,255,255,0.03); border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
        .profile-section { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .avatar { width: 60px; height: 60px; background: #667eea; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .search-box { padding: 15px; }
        .search-box input { width: 100%; background: rgba(255,255,255,0.1); border: none; padding: 10px; border-radius: 8px; color: white; }
        
        /* Основной чат */
        .main-chat { flex: 1; display: flex; flex-direction: column; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        .message { max-width: 80%; padding: 12px; border-radius: 12px; font-size: 14px; position: relative; }
        .mine { align-self: flex-end; background: #667eea; }
        .others { align-self: flex-start; background: rgba(255,255,255,0.1); }
        .private { border: 1px solid #ffde59; background: rgba(255, 222, 89, 0.1); }
        
        .input-area { padding: 20px; display: flex; gap: 10px; background: rgba(0,0,0,0.2); }
        input#msgInput { flex: 1; background: rgba(255,255,255,0.1); border: none; padding: 15px; border-radius: 12px; color: white; outline: none; }
        button { background: #667eea; border: none; padding: 0 20px; border-radius: 12px; color: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="profile-section">
        <div class="avatar" id="myAvatar">?</div>
        <h3 id="myTitle">Загрузка...</h3>
        <p style="font-size: 12px; opacity: 0.5;">Статус: Online</p>
    </div>
    <div class="search-box">
        <input type="text" id="targetUser" placeholder="Кому написать (Ник)...">
        <p style="font-size: 11px; margin-top: 5px; opacity: 0.5;">Оставь пустым для общего чата</p>
    </div>
    <div id="onlineList" style="padding: 10px; font-size: 13px; color: #667eea;"></div>
</div>

<div class="main-chat">
    <div id="chat-window"></div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Ваше сообщение..." autocomplete="off">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const urlParams = new URLSearchParams(window.location.search);
    const myName = urlParams.get('user') || "Аноним";
    
    document.getElementById('myTitle').innerText = myName;
    document.getElementById('myAvatar').innerText = myName[0].toUpperCase();

    socket.emit('register online', myName);

    function sendMessage() {
        const text = document.getElementById('msgInput').value;
        const to = document.getElementById('targetUser').value.trim();
        
        if (!text) return;

        if (to && to !== myName) {
            socket.emit('private message', { to, from: myName, text });
        } else {
            socket.emit('chat message', { user: myName, text });
        }
        document.getElementById('msgInput').value = "";
    }

    socket.on('chat message', (data) => addMessage(data.user, data.text, false));
    socket.on('private message', (data) => addMessage(data.from, data.text, true));
    socket.on('system message', (text) => addMessage("Система", text, false, true));
    
    socket.on('update online', (users) => {
        document.getElementById('onlineList').innerText = "В сети: " + users.join(', ');
    });

    function addMessage(user, text, isPrivate, isSystem = false) {
        const div = document.createElement('div');
        div.className = `message ${user === myName || user.startsWith('Вы') ? 'mine' : 'others'} ${isPrivate ? 'private' : ''}`;
        if (isSystem) div.style.color = "#ff4b2b";
        div.innerHTML = `<span style="font-size: 10px; display: block; opacity: 0.6">${isPrivate ? '[ЛС] ' : ''}${user}</span>${text}`;
        document.getElementById('chat-window').appendChild(div);
        document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
    }

    document.getElementById('msgInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
