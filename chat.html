<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bizbarmak | Chat</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif; background: #0f0c29;
            margin: 0; display: flex; flex-direction: column; height: 100vh; color: white;
        }
        .header {
            padding: 20px; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; font-size: 20px; font-weight: bold;
        }
        #chat-window {
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px;
        }
        .message {
            max-width: 70%; padding: 12px 16px; border-radius: 15px; font-size: 14px; line-height: 1.4;
        }
        .mine { align-self: flex-end; background: #667eea; border-bottom-right-radius: 2px; }
        .others { align-self: flex-start; background: rgba(255,255,255,0.1); border-bottom-left-radius: 2px; }
        .user-name { font-size: 10px; opacity: 0.6; margin-bottom: 4px; display: block; }

        .input-area {
            padding: 20px; background: rgba(255,255,255,0.05); display: flex; gap: 10px;
        }
        input {
            flex: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            padding: 15px; border-radius: 12px; color: white; outline: none;
        }
        button {
            padding: 0 25px; background: #667eea; border: none; border-radius: 12px;
            color: white; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #764ba2; }
    </style>
</head>
<body>

<div class="header">Bizbarmak Chat</div>

<div id="chat-window">
    <div class="message others">
        <span class="user-name">Система</span>
        Добро пожаловать в общий чат Bizbarmak!
    </div>
</div>

<div class="input-area">
    <input type="text" id="msgInput" placeholder="Написать сообщение..." autocomplete="off">
    <button onclick="sendMessage()">Отправить</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const chatWindow = document.getElementById('chat-window');
    const input = document.getElementById('msgInput');

    // Спрашиваем имя (в идеале передавать из логина, но пока так для теста)
    const myName = prompt("Введите ваш ник для чата:") || "Аноним";

    function sendMessage() {
        if (input.value.trim() !== "") {
            // Отправляем на сервер ник и текст
            socket.emit('chat message', { user: myName, text: input.value });
            input.value = "";
        }
    }

    // Слушаем сообщения от сервера
    socket.on('chat message', (data) => {
        const msgDiv = document.createElement('div');
        // Если имя совпадает с твоим — сообщение справа, если нет — слева
        msgDiv.className = data.user === myName ? 'message mine' : 'message others';
        
        msgDiv.innerHTML = `<span class="user-name">${data.user}</span>${data.text}`;
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    });

    input.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
</script>
        }
    }

    // Отправка по нажатию Enter
    document.getElementById('msgInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') sendMessage();
    });
</script>

</body>
</html>
