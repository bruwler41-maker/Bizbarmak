<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bizbarmak</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #0f0c29; margin: 0; display: flex; height: 100vh; color: white; overflow: hidden; }
        .sidebar { width: 280px; background: rgba(255,255,255,0.03); border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
        .profile-section { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .my-avatar { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #667eea; object-fit: cover; margin-bottom: 10px; }
        .main-chat { flex: 1; display: flex; flex-direction: column; background: #0f0c29; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg-container { display: flex; align-items: flex-end; gap: 10px; max-width: 85%; }
        .mine-container { flex-direction: row-reverse; align-self: flex-end; }
        .others-container { align-self: flex-start; }
        .chat-avatar { width: 38px; height: 38px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .message { padding: 12px 16px; border-radius: 18px; font-size: 14px; position: relative; }
        .mine { background: #667eea; border-bottom-right-radius: 4px; }
        .others { background: rgba(255,255,255,0.1); border-bottom-left-radius: 4px; }

        .rank-badge { font-size: 8px; font-weight: bold; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; margin-left: 8px; color: #000; vertical-align: middle; }
        .rank-chef { background: linear-gradient(-45deg, #f6d365, #fda085, #f6d365, #fda085) !important; background-size: 400% 400% !important; animation: grad 3s ease infinite; color: #fff !important; }
        .rank-admin { background: linear-gradient(-45deg, #ff4b2b, #ff416c, #ff4b2b, #ff416c) !important; background-size: 400% 400% !important; animation: grad 2s linear infinite; color: #fff !important; box-shadow: 0 0 10px #ff4b2b; }

        @keyframes grad { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .input-area { padding: 20px; display: flex; gap: 10px; background: rgba(15, 12, 41, 0.9); }
        input#msgInput { flex: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; color: white; outline: none; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; backdrop-filter: blur(6px); }
        .modal-content { background: #1a1a2e; padding: 25px; border-radius: 20px; width: 340px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        
        /* Кнопки админа */
        .admin-box { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; margin-top: 15px; }
        .admin-btn { background: #333; color: white; border: none; padding: 6px; border-radius: 6px; cursor: pointer; font-size: 10px; margin: 2px; width: 30%; }
        .admin-btn:hover { background: #667eea; }
        .mute-btn { background: #7c4dff; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="profile-section">
        <img id="myAvatar" class="my-avatar" src="" alt="?">
        <h3 id="myNameDisplay">...</h3>
        <p id="myBioDisplay" style="font-size: 10px; opacity: 0.6;"></p>
        <button onclick="toggleModal('settingsModal', true)" style="font-size:10px; background:none; border:1px solid #333; color:gray; cursor:pointer;">Настройки</button>
    </div>
    <div id="onlineList" style="padding: 20px; font-size: 11px; color: #667eea;"></div>
</div>

<div class="main-chat">
    <div id="chat-window"></div>
   <div class="input-area" style="position: relative;">
        <div id="stickerPanel" style="display:none; position:absolute; bottom:80px; left:20px; background:#1a1a2e; border:1px solid rgba(255,255,255,0.1); padding:10px; border-radius:15px; display:grid; grid-template-columns:repeat(4,1fr); gap:10px; z-index:100; backdrop-filter:blur(10px);">
            <img src="https://cdn-icons-png.flaticon.com/512/2274/2274543.png" style="width:45px; cursor:pointer;" onclick="sendSticker(this.src)">
            <img src="https://cdn-icons-png.flaticon.com/512/2274/2274555.png" style="width:45px; cursor:pointer;" onclick="sendSticker(this.src)">
            <img src="https://cdn-icons-png.flaticon.com/512/2274/2274550.png" style="width:45px; cursor:pointer;" onclick="sendSticker(this.src)">
            <img src="https://cdn-icons-png.flaticon.com/512/2584/2584606.png" style="width:45px; cursor:pointer;" onclick="sendSticker(this.src)">
        </div>

        <button onclick="toggleStickers()" style="background:none; border:none; font-size:20px; cursor:pointer; padding:0 10px;">😊</button>
        <input type="text" id="msgInput" placeholder="Ваше сообщение..." autocomplete="off">
        <button onclick="send()" style="background:#667eea; border:none; padding:15px; border-radius:15px; color:white; cursor:pointer;">➤</button>
    </div>
</div>

<div id="profileModal" class="modal" onclick="toggleModal('profileModal', false)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <img id="vAvatar" src="" style="width:90px; height:90px; border-radius:50%; border:2px solid #667eea;">
        <h2 id="vName" style="margin:10px 0;"></h2>
        <div id="vRankBox"></div>
        
        <div id="adminPanel" style="display:none;" class="admin-box">
            <p style="font-size:10px; color:#ff4b2b; font-weight:bold; margin-bottom:5px;">ПУЛЬТ АДМИНИСТРАТОРА</p>
            <div style="margin-bottom:5px;">
                <button class="admin-btn" onclick="giveXP(100)">+100 XP</button>
                <button class="admin-btn" onclick="giveXP(500)">+500 XP</button>
                <button class="admin-btn" onclick="setChef()" style="background:#f6d365; color:black;">ШЕФ</button>
            </div>
            <div>
                <button class="admin-btn mute-btn" onclick="mute(1)">Мут 1м</button>
                <button class="admin-btn mute-btn" onclick="mute(5)">Мут 5м</button>
                <button class="admin-btn mute-btn" onclick="mute(10)">Мут 10м</button>
            </div>
            <button class="admin-btn" onclick="resetXP()" style="background:red; width:94%; margin-top:5px;">ОБНУЛИТЬ XP</button>
        </div>
        
        <button onclick="toggleModal('profileModal', false)" style="margin-top:15px; opacity:0.5; background:none; border:none; color:white; cursor:pointer;">Закрыть</button>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3>Профиль</h3>
        <input type="color" id="colorPicker" style="width:100%; height:40px; margin-bottom:10px;">
        <textarea id="bioInput" placeholder="Статус..." style="width:100%; background:#000; color:white; padding:10px;"></textarea>
        <button onclick="save()" style="width:100%; padding:15px; background:#667eea; border:none; border-radius:12px; color:white; margin-top:10px;">Сохранить</button>
        <button onclick="toggleModal('settingsModal', false)" style="background:none; border:none; color:gray; margin-top:10px;">Отмена</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const myName = new URLSearchParams(window.location.search).get('user') || "Гость";
    let targetUser = "";

    function getRank(xp) {
        if (xp === -1) return { name: "АДМИН", icon: "⚡", color: "#ff4b2b", class: "rank-admin" };
        if (xp === -2) return { name: "БОТ", icon: "🤖", color: "#667eea", class: "" };
        if (xp < 100) return { name: "Голодный", icon: "🥖", color: "#aaa", class: "" };
        if (xp < 500) return { name: "Гость", icon: "🍽️", color: "#4facfe", class: "" };
        if (xp < 1500) return { name: "Ценитель", icon: "🍷", color: "#f093fb", class: "" };
        return { name: "Шеф Bizbarmak", icon: "👑", color: "#f6d365", class: "rank-chef" };
    }

    socket.emit('register online', myName);
    socket.on('profile data', user => {
        const r = getRank(user.xp);
        document.getElementById('myNameDisplay').innerText = user.username;
        document.getElementById('myAvatar').src = user.avatar;
        document.getElementById('myBioDisplay').innerHTML = `${r.icon} ${r.name} | XP: ${user.xp === -1 ? '∞' : user.xp}`;
    });

    function toggleModal(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; }

    function send() {
        const text = document.getElementById('msgInput').value.trim();
        if (text) { socket.emit('chat message', { user: myName, text }); document.getElementById('msgInput').value = ""; }
    }

    socket.on('chat message', d => add(d.user, d.text, d.color, d.avatar, d.xp));

    function add(user, text, color, avatar, xp) {
        const win = document.getElementById('chat-window');
        const r = getRank(xp);
        const isMe = user === myName;
        const div = document.createElement('div');
        div.className = `msg-container ${isMe ? 'mine-container' : 'others-container'}`;
        div.innerHTML = `
            <img src="${avatar}" class="chat-avatar" onclick="socket.emit('get info', '${user}')">
            <div class="message ${isMe ? 'mine' : 'others'}">
                <div style="font-size:9px; color:${color}; margin-bottom:3px;">
                    <b>${user}</b> <span class="rank-badge ${r.class}" style="background:${r.color}">${r.icon} ${r.name}</span>
                </div>
                ${text}
            </div>
        `;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    socket.on('user info', user => {
        const r = getRank(user.xp);
        targetUser = user.username;
        document.getElementById('vName').innerText = user.username;
        document.getElementById('vAvatar').src = user.avatar;
        document.getElementById('vRankBox').innerHTML = `<span class="rank-badge ${r.class}" style="background:${r.color}; padding:5px;">${r.icon} ${r.name}</span> <p style="font-size:10px;">XP: ${user.xp}</p>`;
        
        const panel = document.getElementById('adminPanel');
        panel.style.display = (myName === "@-ADMIN-@" && user.username !== "@-ADMIN-@") ? "block" : "none";
        toggleModal('profileModal', true);
    });

    // АДМИН-ФУНКЦИИ
    function giveXP(val) { socket.emit('admin add xp', { targetName: targetUser, amount: val }); toggleModal('profileModal', false); }
    function setChef() { socket.emit('admin set chef', targetUser); toggleModal('profileModal', false); }
    function mute(mins) { socket.emit('admin mute', { targetName: targetUser, minutes: mins }); toggleModal('profileModal', false); }
    function resetXP() { socket.emit('admin reset xp', targetUser); toggleModal('profileModal', false); }

    socket.on('update online', list => { document.getElementById('onlineList').innerText = "В сети: " + list.join(', '); });
    document.getElementById('msgInput').onkeypress = (e) => { if(e.key==='Enter') send(); };
    function toggleStickers() {
        const panel = document.getElementById('stickerPanel');
        panel.style.display = (panel.style.display === 'none' || panel.style.display === '') ? 'grid' : 'none';
    }

    function sendSticker(url) {
        socket.emit('chat message', { user: myName, text: url, type: 'sticker' });
        document.getElementById('stickerPanel').style.display = 'none';
    }
</script>
</body>
</html>
