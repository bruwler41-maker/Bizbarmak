<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bizbarmak | Stickers</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #0f0c29; margin: 0; display: flex; height: 100vh; color: white; overflow: hidden; }
        .sidebar { width: 260px; background: rgba(255,255,255,0.03); border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
        .profile-section { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .my-avatar { width: 70px; height: 70px; border-radius: 50%; border: 2px solid #667eea; }
        .main-chat { flex: 1; display: flex; flex-direction: column; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg-container { display: flex; align-items: flex-end; gap: 10px; max-width: 80%; }
        .mine-container { align-self: flex-end; flex-direction: row-reverse; }
        .message { padding: 12px; border-radius: 15px; font-size: 14px; }
        .mine { background: #667eea; }
        .others { background: rgba(255,255,255,0.1); }
        
        .rank-badge { font-size: 8px; font-weight: bold; padding: 2px 5px; border-radius: 4px; margin-left: 5px; color: #fff; }
        .rank-admin { background: linear-gradient(-45deg, #ff4b2b, #ff416c); animation: grad 2s linear infinite; }
        .rank-chef { background: linear-gradient(-45deg, #f6d365, #fda085); animation: grad 3s ease infinite; }
        @keyframes grad { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* ПАНЕЛЬ СТИКЕРОВ */
        #stickerPanel { display: none; position: absolute; bottom: 80px; right: 20px; background: #1a1a2e; border: 1px solid #333; padding: 10px; border-radius: 15px; grid-template-columns: repeat(4, 1fr); gap: 10px; z-index: 100; }
        .sticker { width: 50px; height: 50px; cursor: pointer; transition: 0.2s; }
        .sticker:hover { transform: scale(1.1); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="profile-section">
        <img id="myAvatar" class="my-avatar" src="">
        <h3 id="myNameDisplay">...</h3>
        <p id="myBioDisplay" style="font-size:10px; opacity:0.5;"></p>
    </div>
    <div id="onlineList" style="padding:20px; font-size:11px; color:#667eea;"></div>
</div>

<div class="main-chat">
    <div id="chat-window"></div>
    
    <div id="stickerPanel">
        <img class="sticker" src="https://cdn-icons-png.flaticon.com/512/2274/2274543.png" onclick="sendSticker(this.src)">
        <img class="sticker" src="https://cdn-icons-png.flaticon.com/512/2274/2274555.png" onclick="sendSticker(this.src)">
        <img class="sticker" src="https://cdn-icons-png.flaticon.com/512/2274/2274550.png" onclick="sendSticker(this.src)">
        <img class="sticker" src="https://cdn-icons-png.flaticon.com/512/2584/2584606.png" onclick="sendSticker(this.src)">
    </div>

    <div style="padding:15px; display:flex; gap:10px; background:rgba(0,0,0,0.2);">
        <button onclick="document.getElementById('stickerPanel').style.display = document.getElementById('stickerPanel').style.display === 'grid' ? 'none' : 'grid'" style="background:none; border:none; font-size:20px; cursor:pointer;">😊</button>
        <input type="text" id="msgInput" placeholder="Сообщение..." style="flex:1; background:rgba(255,255,255,0.05); border:none; border-radius:10px; color:white; padding:10px;">
        <button onclick="send()" style="background:#667eea; border:none; padding:10px 20px; border-radius:10px; color:white; cursor:pointer;">➤</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const myName = new URLSearchParams(window.location.search).get('user') || "Гость";

    function getRank(xp) {
        if (xp === -1) return { name: "АДМИН", icon: "⚡", class: "rank-admin" };
        if (xp < 100) return { name: "Голодный", icon: "🥖", class: "" };
        if (xp >= 1500) return { name: "ШЕФ", icon: "👑", class: "rank-chef" };
        return { name: "Гость", icon: "🍽️", class: "" };
    }

    socket.emit('register online', myName);
    socket.on('profile data', user => {
        const r = getRank(user.xp);
        document.getElementById('myNameDisplay').innerText = user.username;
        document.getElementById('myAvatar').src = user.avatar;
        document.getElementById('myBioDisplay').innerText = r.name;
    });

    function send() {
        const input = document.getElementById('msgInput');
        if (input.value.trim()) {
            socket.emit('chat message', { user: myName, text: input.value, type: 'text' });
            input.value = "";
        }
    }

    function sendSticker(url) {
        socket.emit('chat message', { user: myName, text: url, type: 'sticker' });
        document.getElementById('stickerPanel').style.display = 'none';
    }

    socket.on('chat message', d => {
        const win = document.getElementById('chat-window');
        const isMe = d.user === myName;
        const r = getRank(d.xp);
        const div = document.createElement('div');
        div.className = `msg-container ${isMe ? 'mine-container' : ''}`;
        
        let content = d.type === 'sticker' ? `<img src="${d.text}" style="width:80px;">` : d.text;

        div.innerHTML = `
            <div class="message ${isMe ? 'mine' : 'others'}">
                <div style="font-size:9px; opacity:0.7; margin-bottom:3px;">
                    ${d.user} <span class="rank-badge ${r.class}">${r.icon}</span>
                </div>
                ${content}
            </div>
        `;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    });

    socket.on('update online', list => { document.getElementById('onlineList').innerText = "Онлайн: " + list.join(', '); });
    document.getElementById('msgInput').onkeypress = (e) => { if(e.key==='Enter') send(); };
</script>
</body>
</html>
