<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bizbarmak | Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #0f0c29; margin: 0; display: flex; height: 100vh; color: white; overflow: hidden; }
        .sidebar { width: 280px; background: rgba(255,255,255,0.03); border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
        .profile-section { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .avatar { width: 70px; height: 70px; background: #667eea; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; }
        .settings-btn { background: none; border: 1px solid rgba(255,255,255,0.2); color: white; padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; margin-top: 10px; }
        .search-box { padding: 15px; }
        .search-box input { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; color: white; outline: none; }
        .main-chat { flex: 1; display: flex; flex-direction: column; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 14px; position: relative; }
        .mine { align-self: flex-end; background: #667eea; border-bottom-right-radius: 4px; }
        .others { align-self: flex-start; background: rgba(255,255,255,0.1); border-bottom-left-radius: 4px; }
        .private { border: 1px solid #ffde59; background: rgba(255, 222, 89, 0.1) !important; }
        .input-area { padding: 20px; display: flex; gap: 10px; background: rgba(255,255,255,0.02); }
        input#msgInput { flex: 1; background: rgba(255,255,255,0.1); border: none; padding: 15px; border-radius: 15px; color: white; outline: none; }
        button#sendBtn { background: #667eea; border: none; width: 50px; height: 50px; border-radius: 50%; color: white; cursor: pointer; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: #1a1a2e; padding: 30px; border-radius: 24px; width: 320px; border: 1px solid rgba(255,255,255,0.1); }
        .modal-content input, .modal-content textarea { width: 100%; background: #0f0c29; border: 1px solid #333; color: white; padding: 12px; margin: 10px 0; border-radius: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="profile-section">
        <div class="avatar" id="myAvatar">?</div>
        <h3 id="myTitle">...</h3>
        <p id="myBio" style="font-size: 11px; opacity: 0.6; margin: 0;">Загрузка...</p>
        <button class="settings-btn" onclick="openSettings()">⚙ Настройки</button>
    </div>
    <div class="search-box"><input type="text" id="targetUser" placeholder="Кому (Ник)..."></div>
    <div id="onlineList" style="padding: 15px; font-size: 12px; opacity: 0.5;"></div>
</div>

<div class="main-chat">
    <div id="chat-window"></div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Напиши..." autocomplete="off">
        <button id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3>Профиль</h3>
        <label>Цвет имени:</label><input type="color" id="colorPicker" value="#667eea">
        <label>Статус:</label><textarea id="bioInput" rows="2"></textarea>
        <button onclick="saveSettings()" style="width:100%; padding:12px; background:#667eea; border:none; border-radius:10px; color:white; font-weight:bold; cursor:pointer;">Сохранить</button>
        <button onclick="closeSettings()" style="width:100%; padding:10px; background:transparent; border:none; color:rgba(255,255,255,0.5); cursor:pointer;">Закрыть</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const urlParams = new URLSearchParams(window.location.search);
    const myName = urlParams.get('user') || "Аноним";
    document.getElementById('myTitle').innerText = myName;
    document.getElementById('myAvatar').innerText = myName[0].toUpperCase();

    socket.emit('register online', myName);

    socket.on('profile data', (data) => {
        if(data) {
            document.getElementById('myAvatar').style.background = data.color;
            document.getElementById('colorPicker').value = data.color;
            document.getElementById('myBio').innerText = data.bio;
            document.getElementById('bioInput').value = data.bio;
        }
    });

    function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
    function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
    
    function saveSettings() {
        const color = document.getElementById('colorPicker').value;
        const bio = document.getElementById('bioInput').value;
        document.getElementById('myAvatar').style.background = color;
        document.getElementById('myBio').innerText = bio;
        socket.emit('update profile', { username: myName, color, bio });
        closeSettings();
    }

    function sendMessage() {
        const text = document.getElementById('msgInput').value.trim();
        const to = document.getElementById('targetUser').value.trim();
        if (!text) return;
        if (to && to !== myName) { socket.emit('private message', { to, from: myName, text }); } 
        else { socket.emit('chat message', { user: myName, text }); }
        document.getElementById('msgInput').value = "";
    }

    socket.on('chat message', (data) => addMessage(data.user, data.text, false, false, data.color));
    socket.on('private message', (data) => addMessage(data.from, data.text, true, false, data.color));
    socket.on('system message', (text) => addMessage("Система", text, false, true));
    
    socket.on('update online', (users) => {
        document.getElementById('onlineList').innerText = "В сети: " + users.join(', ');
    });

    function addMessage(user, text, isPrivate, isSystem = false, color = "#fff") {
        const div = document.createElement('div');
        div.className = `message ${user === myName || user.startsWith('Вы') ? 'mine' : 'others'} ${isPrivate ? 'private' : ''}`;
        div.innerHTML = `<span style="font-size: 10px; display: block; opacity: 0.8; color: ${color}; font-weight: bold;">${isPrivate ? '[ЛС] ' : ''}${user}</span>${text}`;
        document.getElementById('chat-window').appendChild(div);
        document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
    }

    document.getElementById('msgInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
