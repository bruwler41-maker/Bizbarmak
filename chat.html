<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bizbarmak | Edit & Delete</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* ... (предыдущие стили сохраняются) ... */
        * { box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #0f0c29; margin: 0; display: flex; height: 100vh; color: white; overflow: hidden; }
        .main-chat { flex: 1; display: flex; flex-direction: column; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg-container { display: flex; align-items: flex-end; gap: 8px; position: relative; group; }
        .message { padding: 10px 15px; border-radius: 15px; font-size: 14px; max-width: 70%; position: relative; }
        .mine { align-self: flex-end; background: #667eea; border-bottom-right-radius: 2px; }
        .others { align-self: flex-start; background: rgba(255,255,255,0.1); border-bottom-left-radius: 2px; }
        
        /* КНОПКИ ДЕЙСТВИЙ */
        .actions { display: none; gap: 5px; margin-bottom: 5px; }
        .msg-container:hover .actions { display: flex; }
        .action-btn { background: none; border: none; cursor: pointer; font-size: 12px; opacity: 0.5; color: white; transition: 0.3s; }
        .action-btn:hover { opacity: 1; color: #ff4b2b; }

        .rank-badge { font-size: 8px; padding: 2px 5px; border-radius: 4px; margin-left: 5px; color: #000; }
        .rank-admin { animation: grad 2s linear infinite; box-shadow: 0 0 5px red; color: #fff !important; }
        @keyframes grad { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body>

<div class="main-chat">
    <div id="chat-window"></div>
    <div style="padding: 20px; display: flex; gap: 10px; background: rgba(0,0,0,0.2);">
        <input type="text" id="msgInput" placeholder="Сообщение..." style="flex:1; padding:15px; border-radius:10px; border:none; background:rgba(255,255,255,0.1); color:white;">
        <button onclick="send()" style="padding:15px; border-radius:10px; border:none; background:#667eea; color:white; cursor:pointer;">➤</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const myName = new URLSearchParams(window.location.search).get('user') || "Гость";

    function getRank(xp) {
        if (xp === -1) return { name: "АДМИН", icon: "⚡", color: "#ff4b2b", class: "rank-admin" };
        if (xp < 100) return { name: "Голодный", icon: "🥖", color: "#aaa", class: "" };
        return { name: "Шеф", icon: "👑", color: "#f6d365", class: "rank-chef" };
    }

    function send() {
        const input = document.getElementById('msgInput');
        if (input.value.trim()) {
            socket.emit('chat message', { user: myName, text: input.value });
            input.value = "";
        }
    }

    socket.on('chat message', d => {
        const win = document.getElementById('chat-window');
        const isMe = d.user === myName;
        const r = getRank(d.xp);
        
        const div = document.createElement('div');
        div.className = `msg-container ${isMe ? 'mine' : 'others'}`;
        div.id = `msg-${d.id}`;
        div.innerHTML = `
            <div style="font-size: 10px; opacity: 0.5; margin-bottom: 2px;">
                ${d.user} <span class="rank-badge ${r.class}" style="background:${r.color}">${r.icon}</span>
                <div class="actions" style="display:inline-flex; margin-left:10px;">
                    <button class="action-btn" onclick="editMsg('${d.id}')">✏️</button>
                    <button class="action-btn" onclick="deleteMsg('${d.id}')">🗑️</button>
                </div>
            </div>
            <div class="text" id="text-${d.id}">${d.text}</div>
        `;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    });

    // УДАЛЕНИЕ ИЗ DOM
    socket.on('message deleted', id => {
        const el = document.getElementById(`msg-${id}`);
        if (el) el.style.opacity = "0.3", el.innerHTML = "<i>Сообщение удалено</i>";
    });

    // РЕДАКТИРОВАНИЕ В DOM
    socket.on('message edited', data => {
        const el = document.getElementById(`text-${data.id}`);
        if (el) el.innerText = data.newText;
    });

    function deleteMsg(id) { if(confirm("Удалить?")) socket.emit('delete message', id); }
    
    function editMsg(id) {
        const oldText = document.getElementById(`text-${id}`).innerText.replace(" (изм.)", "");
        const newText = prompt("Редактировать:", oldText);
        if (newText && newText !== oldText) {
            socket.emit('edit message', { id, newText });
        }
    }

    document.getElementById('msgInput').onkeypress = (e) => { if(e.key==='Enter') send(); };
    socket.emit('register online', myName);
</script>
</body>
</html>
